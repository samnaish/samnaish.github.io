<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <title>Sam's Super Awesome page</title>
        <style>
            /* * {
                outline: 1px solid red;
            } */
            body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                -webkit-font-smoothing: antialiased;
                text-rendering: optimizeLegibility;
            }
            .section {
                text-align: center;
                padding: 60px;
            }
            .section--splash {
                display: flex;
                flex-direction: column;
                justify-content: center;
                background-color: aquamarine;
                height: 65%;
            }
            .section--dark {
                background-color:rgba(51, 59, 80, 1); 
                color: white;
            }
            .section__title {
                font-size: 8vmin;
                opacity: 0;
                animation-name: fadeIn;
                animation-duration: 0.5s;
                animation-fill-mode: forwards;
            }
            
            .section__subtitle {
                font-size: 4vmin;
                opacity: 0;
                animation-name: fadeIn;
                animation-duration: 0.5s;
                animation-fill-mode: forwards;
                animation-delay: 0.2s;
            }

            @keyframes fadeIn {
                0% {
                    opacity: 0;
                }
                100% {
                    opacity: 1;
                }
            }

            .section__heading {
                opacity: 0;
                animation-name: fadeIn;
                animation-duration: 0.5s;
                animation-fill-mode: forwards;
                animation-delay: 0.4s;
            }

            .section__content {
                opacity: 0;
                animation-name: fadeIn;
                animation-duration: 0.5s;
                animation-fill-mode: forwards;
                animation-delay: 0.4s;
            }
        
             #project-list {
                list-style-type: none;
            }

            .links { 
                list-style-type: none;
            }


        </style>
    </head>
    <body>
        <main id="splash" class="section section--splash">
            <h1 class="section__title">Sam Naish</h1>
            <h2 class="section__subtitle">Junior Web Developer</h2>
        </main>
        <section class="section">
            <h2 class="section__heading">About Me</h2>
            <p class="section__content">I work in a secondary school as a LSA and I am working to improve my web development skills.</p>
        </section>
        <section class="section section--dark">
            <h2 class="section__heading">Projects</h2>
            <p class="section__content">Coming Soon!!!!</p>
            <ul id="project-list">
                <li><a href="https://codepen.io/samnaish/full/bQPpyJ" target="_blank">Tribute page</a></li>
                <li><a href="https://codepen.io/samnaish/full/qQeqdB" target="_blank">Survey form</a></li>
                <li><a href="https://codepen.io/samnaish/full/wEKgQJ" target="_blank">Basic Pricing Option</a></li>
                <li><a href="https://codepen.io/samnaish/full/yxYebG" target="_blank">webpage design</a></li>
                <li><a href="https://codepen.io/samnaish/full/dKqZMx" target="_blank">Sample Login Page</a></li>
            </ul>
        </section>
        <section class="section">
            <h2 class="section__heading">My Profiles</h2>
            <p class="section__content">
                <ul>
                    <li><a href="https://github.com/samnaish">GitHub</a></li>
                    <li><a href="https://codepen.io/samnaish/">Codepen</a></li>
                </ul>
            </p>
        </section>
    </body>
</html>
