<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <title>Sam's Super Awesome page</title>
        <style>
            
            * {
                margin: 0;
            }

            *, *:before, *:after {
                box-sizing: border-box;
            }
            
            body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                -webkit-font-smoothing: antialiased;
                text-rendering: optimizeLegibility;
                text-align: center;
            }

            .section {
                text-align: center;
                padding: 60px;
            }

            .section--splash {
                display: flex;
                flex-direction: column;
                justify-content: center;
                background-color: aquamarine;
                height: 65%;
            }

            .section--dark {
                background-color: #668ba3; 
                color: white;
            }

            .section__title {
                font-size: 8vmin;
                opacity: 0;
                animation-name: fadeIn;
                animation-duration: 0.5s;
                animation-fill-mode: forwards;
            }
            
            .section__subtitle {
                font-size: 4vmin;
                opacity: 0;
                animation-name: fadeIn;
                animation-duration: 0.5s;
                animation-fill-mode: forwards;
                animation-delay: 0.2s;
            }

            @keyframes fadeIn {
                0% {
                    opacity: 0;
                }
                100% {
                    opacity: 1;
                }
            }

            .section__heading {
                opacity: 0;
                animation-name: fadeIn;
                animation-duration: 0.5s;
                animation-fill-mode: forwards;
                animation-delay: 0.4s;
                text-align: center;
            }

            .section__content {
                opacity: 0;
                animation-name: fadeIn;
                animation-duration: 0.5s;
                animation-fill-mode: forwards;
                animation-delay: 0.4s;
            }

            .section__projects, .section__show-all, .section__contacts {
                opacity: 0;
                animation-name: fadeIn;
                animation-duration: 0.3s;
                animation-fill-mode: forwards;
                animation-delay: 0.6s;
            }
        
            #project-list {
                list-style-type: none;
            }

            .section__projects {
                padding-top: 60px;
                margin-top: 10px;
                display: flex;
                flex-direction: row;
                justify-content: center;
                flex-wrap: wrap;
                max-width: 75%;
                margin: 0 auto;
            }

            .project {
                flex-basis: 50%;
                padding: 20px;
                min-width: 375px;
                text-decoration: none;
            }

            .project__pic {
                width: auto;
                height: 190px;
                border-bottom: 2px solid lightblue;
            }

            .project__title {
                color: white;
                text-decoration: none;
                padding: 10px 0;
            }

            .project__title:visited {
                text-decoration: none;
            }

            .section__projects .work-header {
                margin-top: 50px;
                color: white;
                font-weight: bold;
            }

            .section__show-all {
                text-decoration: none;
                display: block;
                width: 200px;
                margin: 20px auto 90px;
                background: #e0ebe8;
                color: #008080;
                font-weight: bold;
                border: 2px solid #90C695;
                border-radius: 4px;
                cursor: pointer;
                padding:10px;
            }

            .section__show-all:hover {
                background: rgb(232, 120, 46);
                color: green;
            }

            .section__contacts { 
                list-style-type: none;
                display: flex;
                flex-direction: row;
                margin: 20px auto;
                padding: 0;
                width: 50%;
                justify-content: center;
            }

            .section__contact-detail {
                display: inline-block;
                font-weight: bold;
                margin: 0 20px;
                border: 2px solid #668ba3;
                border-radius: 100%;
                width: 100px;
                height: 100px;
                line-height: 100px;
                background: #e0ebe8;
                color: #008080;
                text-decoration: none;
            }

            .section__contact-detail:hover {
                background: #7bc1c4;
                color: green;
            }

        </style>
    </head>
    <body>
        <main id="splash" class="section section--splash">
            <h1 class="section__title">Sam Naish</h1>
            <h2 class="section__subtitle">Junior Web Developer</h2>
        </main>
        <section class="section">
            <h2 class="section__heading">About Me</h2>
            <p class="section__content">I work in a secondary school as a LSA and I am working to improve my web development skills.</p>
        </section>
        <section class="section section--dark">
            <h2 class="section__heading">What I've been up to:</h2>
            <p class="section__content">These are some of my projects...</p>
            <div class="section__projects">
                <a href="https://codepen.io/samnaish/pen/bQPpyJ?editors=1100" target="_blank" class="project">
                    <img class="project__pic" src="https://i.kinja-img.com/gawker-media/image/upload/bgmeeufntw5hjah5ofhs.jpg" alt="project">
                    <div class="project__title">Tribute Page</div>
                </a>
                <a href="https://codepen.io/samnaish/pen/dKqZMx" target="_blank" class="project">
                    <img class="project__pic" src="https://cdn.colorlib.com/wp/wp-content/uploads/sites/2/Simple_Login_Form_Flat_UI.png" alt="project">
                    <div class="project__title">Login Page</div>
                </a>
            </div>
            <a href="https://codepen.io/samnaish/" class="section__show-all" target="_blank">Show all</a>
        </section>
        <section class="section">
            <h2 class="section__heading">My Profiles</h2>
            <p class="section__content">
                <ul class="section__contacts">
                    <li><a href="https://github.com/samnaish" target="_blank" class="section__contact-detail">GitHub</a></li>
                    <li><a href="https://codepen.io/samnaish/" target="_blank" class="section__contact-detail">Codepen</a></li>
                </ul>
            </p>
        </section>
    </body>
</html>
